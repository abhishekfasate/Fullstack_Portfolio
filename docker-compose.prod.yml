# ── Production compose ────────────────────────────────────────────────────────
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  backend:
    image: ${REGISTRY}/portfolio-backend:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    volumes:
      - static_files:/app/static
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Alembic runs as a one-off before the API starts
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  celery:
    image: ${REGISTRY}/portfolio-backend:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.tasks.worker worker --loglevel=warning --concurrency=4

  frontend:
    image: ${REGISTRY}/portfolio-frontend:${IMAGE_TAG:-latest}
    restart: always

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/ssl:ro    # mounted from host (certbot)
      - static_files:/srv/static:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redisdata:
  static_files: